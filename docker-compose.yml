services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ohmyoffer}
      POSTGRES_USER: ${POSTGRES_USER:-ohmyoffer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ohmyoffer} -d ${POSTGRES_DB:-ohmyoffer}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: Ohmyoffer API
      ENVIRONMENT: production
      API_V1_PREFIX: /api/v1
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ohmyoffer}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-ohmyoffer}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      AUTH_COOKIE_NAME: ohmyoffer_access_token
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-flash}
      LLM_THINKING_ENABLED: ${LLM_THINKING_ENABLED:-false}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_API_BASE_URL: ${FEISHU_API_BASE_URL:-https://open.feishu.cn/open-apis}
      FEISHU_TOKEN_CACHE_TTL_SECONDS: ${FEISHU_TOKEN_CACHE_TTL_SECONDS:-6600}
      GITHUB_PROXY_URL: ${GITHUB_PROXY_URL:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)"]
      interval: 20s
      timeout: 10s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_INTERNAL_URL: http://api:8000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-80}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
